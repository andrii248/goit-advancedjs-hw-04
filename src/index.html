<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HW4</title>
    <link
      rel="stylesheet"
      href="node_modules/modern-normalize/modern-normalize.css"
    />

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="container">
      <form class="search-form" id="search-form">
        <input
          type="text"
          name="searchQuery"
          autocomplete="off"
          placeholder="Search images..."
        />
        <button type="submit">Search</button>
      </form>

      <div class="gallery">
        <!-- Картки зображень -->
      </div>

      <button type="button" class="load-more is-hidden" data-action="load">
        <span
          class="spinner-border-sm spinner"
          role="status"
          aria-hidden="true"
        ></span>
        <span class="load-more_text">Load more</span>
      </button>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
